<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fast Food Calorie Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="page">

    <header class="app-header">
      <div>
        <h1>Calorie Tracker</h1>
        <p class="subtitle">Log your fast food — enter calories manually for accuracy</p>
      </div>
    </header>

    <!-- Summary -->
    <div class="total-card">
      <div>
        <div class="total-label">Total calories today</div>
        <div class="total-num"><span id="grand-total">0</span> <span class="total-unit">kcal</span></div>
      </div>
      <div class="goal-side">
        <div class="total-label">Daily goal</div>
        <div class="goal-row">
          <input type="number" id="goal" value="2000" min="500" max="6000" step="50" />
          <span class="goal-unit">kcal</span>
        </div>
        <div class="bar-track"><div class="bar-fill" id="bar" style="width:0%"></div></div>
        <div id="remaining-lbl" class="remaining-lbl">2000 kcal remaining</div>
      </div>
    </div>

    <!-- Form -->
    <div class="form-card">
      <div class="form-grid">
        <div class="field">
          <label for="sel-brand">Franchise</label>
          <select id="sel-brand">
            <option value="">— Select franchise —</option>
          </select>
        </div>
        <div class="field">
          <label for="sel-food">Menu item</label>
          <select id="sel-food" disabled>
            <option value="">— Select item —</option>
          </select>
        </div>
      </div>
      <div class="bottom-row">
        <div class="field">
          <label for="in-qty">Qty</label>
          <input type="number" id="in-qty" value="1" min="0.5" step="0.5" />
        </div>
        <div class="field">
          <label for="in-cal">Calories (kcal) <span class="manual-note">— type manually</span></label>
          <input type="number" id="in-cal" placeholder="e.g. 550" min="0" />
        </div>
        <div class="field">
          <label>&nbsp;</label>
          <button class="add-btn" id="add-btn">+ Add to log</button>
        </div>
      </div>
      <div id="err-msg" class="err-msg" style="display:none"></div>
    </div>

    <!-- Log table -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Franchise</th>
            <th>Item</th>
            <th class="r">Qty</th>
            <th class="r">kcal / serving</th>
            <th class="r">Total kcal</th>
            <th style="width:36px"></th>
          </tr>
        </thead>
        <tbody id="log-body">
          <tr><td colspan="6" class="empty-msg">No items yet — select a franchise and enter calories to get started.</td></tr>
        </tbody>
        <tfoot>
          <tr>
            <td colspan="4" class="foot-label">Grand total</td>
            <td class="r" id="foot-total">0 kcal</td>
            <td></td>
          </tr>
        </tfoot>
      </table>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
